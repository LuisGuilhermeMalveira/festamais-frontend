<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title id="page-title">Catálogo de Festas</title>
<meta name="description" id="meta-desc" content="Aluguel de itens para festas e eventos."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════ TOKENS ═══════════════ */
:root {
  --coral:   #FF5E5B;
  --yellow:  #FFD166;
  --mint:    #06D6A0;
  --purple:  #9B5DE5;
  --sky:     #00BBF9;
  --bg:      #FFFBF5;
  --card:    #FFFFFF;
  --text:    #1A1A2E;
  --muted:   #6B7280;
  --border:  rgba(0,0,0,.08);
  --r:       14px;
  --rs:      8px;
  --shadow:  0 2px 12px rgba(0,0,0,.07);
  --shadowL: 0 8px 32px rgba(0,0,0,.13);
  --safe:    env(safe-area-inset-bottom, 0px);
}

/* ═══════════════ BASE ═══════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { -webkit-text-size-adjust:100%; scroll-behavior:smooth }
body {
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(80px + var(--safe));
}
img { max-width:100%; display:block }
button { font-family:'Nunito',sans-serif; cursor:pointer; border:none; background:none }

/* BG confetti */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 15% 10%,  rgba(255,94,91,.08)  0%,transparent 45%),
    radial-gradient(circle at 85% 85%,  rgba(155,93,229,.09) 0%,transparent 45%),
    radial-gradient(circle at 50% 50%,  rgba(6,214,160,.05)  0%,transparent 55%);
  pointer-events:none; z-index:0;
}

/* ═══════════════ HEADER ═══════════════ */
.hdr {
  position:sticky; top:0; z-index:100;
  background:rgba(255,251,245,.93);
  backdrop-filter:blur(16px);
  border-bottom:1.5px solid var(--border);
  padding:10px 16px;
}
.hdr-inner {
  max-width:720px; margin:0 auto;
  display:flex; align-items:center; gap:12px;
}
.brand-logo { width:44px; height:44px; border-radius:10px; object-fit:cover; flex-shrink:0 }
.brand-logo-ph {
  width:44px; height:44px; border-radius:10px;
  background:linear-gradient(135deg,var(--coral),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka',sans-serif; font-size:20px; font-weight:700; color:#fff;
  flex-shrink:0;
}
.brand-info { flex:1; min-width:0 }
.brand-name {
  font-family:'Fredoka',sans-serif; font-size:1.15rem; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.brand-city { font-size:.72rem; color:var(--muted); font-weight:600; margin-top:2px }
.hdr-pill {
  font-size:.6rem; font-weight:800; letter-spacing:.4px;
  color:var(--purple); border:1.5px solid rgba(155,93,229,.3);
  background:rgba(155,93,229,.08); border-radius:20px; padding:3px 9px;
  flex-shrink:0; white-space:nowrap;
}

/* ═══════════════ DATE HERO ═══════════════ */
.date-zone {
  position:relative; z-index:1;
  padding:16px 16px 0;
  max-width:720px; margin:0 auto;
}
.date-card {
  background:linear-gradient(135deg,var(--coral) 0%,#FF8C5A 55%,var(--yellow) 100%);
  border-radius:var(--r); padding:18px 16px 20px;
  color:#fff;
  box-shadow:0 8px 24px rgba(255,94,91,.3);
}
.date-card h2 {
  font-family:'Fredoka',sans-serif; font-size:1.25rem; font-weight:700; margin-bottom:3px;
}
.date-card p { font-size:.83rem; opacity:.88; margin-bottom:14px }
.date-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center }
.date-field {
  flex:1; min-width:160px;
  background:rgba(255,255,255,.22); border:1.5px solid rgba(255,255,255,.5);
  border-radius:var(--rs); padding:0 12px;
  display:flex; align-items:center; gap:6px;
}
.date-field input[type="date"] {
  flex:1; border:none; background:transparent;
  color:#fff; font-size:.92rem; font-weight:700;
  padding:11px 0; outline:none; font-family:'Nunito',sans-serif;
}
.date-field input::-webkit-calendar-picker-indicator { filter:invert(1); opacity:.8; cursor:pointer }
.btn-ok {
  background:#fff; color:var(--coral); font-weight:800; font-size:.88rem;
  border-radius:var(--rs); padding:12px 18px; flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.15); transition:transform .15s;
}
.btn-ok:active { transform:scale(.96) }

/* ═══════════════ CALENDARIO VISUAL ═══════════════ */
.cal-wrap {
  background:rgba(255,255,255,.95);
  border-radius:14px;
  padding:12px 10px 10px;
  margin:0 0 12px;
  color:var(--text);
}
.cal-nav {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:8px; gap:8px;
}
.cal-nav-btn {
  width:34px; height:34px; min-width:34px;
  border:none;
  border-radius:50%;
  background:var(--coral); color:#fff;
  font-size:18px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; padding:0;
  font-family:inherit;
  box-shadow:0 2px 6px rgba(255,94,91,.3);
  transition:transform .12s, opacity .15s;
}
.cal-nav-btn:active:not(:disabled) { transform:scale(.9) }
.cal-nav-btn:disabled { opacity:.3; cursor:not-allowed; box-shadow:none }
.cal-month {
  font-family:'Fredoka',sans-serif;
  font-size:1rem; font-weight:700;
  color:var(--text);
  text-transform:capitalize;
  flex:1; text-align:center;
  min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.cal-dows {
  display:grid;
  grid-template-columns:repeat(7, minmax(0, 1fr));
  gap:4px;
  margin-bottom:4px;
}
.cal-dow {
  font-size:.66rem;
  font-weight:800;
  color:var(--muted);
  text-align:center;
  letter-spacing:.5px;
  padding:4px 0;
  text-transform:uppercase;
}
.cal-grid {
  display:grid;
  grid-template-columns:repeat(7, minmax(0, 1fr));
  gap:4px;
}
.cal-day {
  height:38px;
  display:flex; align-items:center; justify-content:center;
  font-size:.88rem; font-weight:600;
  color:var(--text);
  background:#F7F4F0;
  border:1.5px solid transparent;
  border-radius:9px;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s, transform .1s, border-color .12s, color .12s;
}
.cal-day:not(.disabled):not(.empty):hover { background:#FFE5D9 }
.cal-day:not(.disabled):not(.empty):active { transform:scale(.92) }
.cal-day.empty { background:transparent; cursor:default; pointer-events:none }
.cal-day.disabled { color:#B8AFA8; opacity:.5; cursor:not-allowed; background:#F7F4F0 }
.cal-day.today { border-color:var(--coral); color:var(--coral); font-weight:800 }
.cal-day.selected {
  background:var(--coral);
  color:#fff;
  border-color:var(--coral);
  font-weight:800;
  box-shadow:0 3px 10px rgba(255,94,91,.4);
}
.cal-day.selected.today { color:#fff }

/* Desktop: dia um pouco maior */
@media (min-width:768px) {
  .cal-day { height:44px; font-size:.95rem }
  .cal-dow { font-size:.72rem }
}

/* Esconder o input nativo, mas mantê-lo no DOM */
.date-row { display:none !important }

/* Banner date selected */
.date-banner {
  display:none; margin-top:0;
  background:rgba(6,214,160,.1); border:1.5px solid rgba(6,214,160,.3);
  border-radius:var(--rs); padding:11px 14px;
  font-size:.86rem; align-items:center; gap:8px; flex-wrap:wrap;
}
.date-banner.show { display:flex }
.date-banner strong { color:#047857; font-weight:800 }
.btn-change {
  margin-left:auto; font-size:.8rem; font-weight:700;
  color:var(--coral); text-decoration:underline;
}

/* ═══════════════ CATALOG AREA ═══════════════ */
.catalog {
  position:relative; z-index:1;
  max-width:720px; margin:0 auto;
  padding:14px 16px;
}

/* Search */
.search-box {
  display:flex; align-items:center; gap:8px;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--rs); padding:0 12px;
  box-shadow:var(--shadow); margin-bottom:0;
}
.search-box input {
  flex:1; border:none; background:transparent; outline:none;
  font-size:.9rem; padding:11px 0; color:var(--text);
  font-family:'Nunito',sans-serif;
}
.search-box input::placeholder { color:var(--muted) }
.search-icon { color:var(--muted); flex-shrink:0 }

/* Chips */
.chips {
  display:flex; gap:6px; overflow-x:auto;
  padding:12px 0 6px; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.chips::-webkit-scrollbar { display:none }
.chip {
  flex-shrink:0;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:20px; padding:6px 14px;
  font-size:.8rem; font-weight:700; color:var(--muted);
  box-shadow:var(--shadow); transition:all .15s;
}
.chip.active {
  background:var(--coral); color:#fff;
  border-color:var(--coral);
  box-shadow:0 4px 12px rgba(255,94,91,.3);
}

/* Catalog header row */
.cat-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 0 10px; gap:8px;
}
.cat-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600 }
.cat-count { font-size:.75rem; color:var(--muted); font-weight:600 }

/* ═══════════════ GRID ═══════════════ */
.items-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(min-width:500px) { .items-grid { gap:14px } }
@media(min-width:640px) { .items-grid { grid-template-columns:repeat(3,1fr); gap:16px } }

/* ═══════════════ ITEM CARD ═══════════════ */
.item-card {
  background:var(--card); border-radius:var(--r);
  border:1.5px solid var(--border); box-shadow:var(--shadow);
  overflow:hidden; display:flex; flex-direction:column;
  transition:box-shadow .2s, transform .2s;
}
.item-card:active { transform:scale(.985) }
.item-card.unavail { opacity:.5; pointer-events:none }

/* Photo */
.item-photo {
  aspect-ratio:1; position:relative; overflow:hidden;
  background:linear-gradient(135deg,#F0EBE3,#E5DDD5);
  display:flex; align-items:center; justify-content:center;
}
.item-photo img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .3s;
}
.item-card:hover .item-photo img { transform:scale(1.05) }
.no-photo { font-size:2.4rem }

/* Availability badge */
.av-badge {
  position:absolute; top:7px; right:7px;
  font-size:.62rem; font-weight:800; letter-spacing:.3px;
  border-radius:20px; padding:3px 8px;
  backdrop-filter:blur(6px);
}
.av-ok   { background:rgba(6,214,160,.88);   color:#04342C }
.av-warn { background:rgba(255,209,102,.92);  color:#633806 }
.av-zero { background:rgba(255,94,91,.9);     color:#fff    }

/* Body */
.item-body { padding:10px 12px 12px; display:flex; flex-direction:column; flex:1; gap:3px }
.item-cat  { font-size:.66rem; font-weight:800; color:var(--purple); text-transform:uppercase; letter-spacing:.5px }
.item-name { font-family:'Fredoka',sans-serif; font-size:.97rem; font-weight:600; line-height:1.2 }
.item-price { font-size:.8rem; color:var(--muted); margin-top:2px }
.item-price strong { font-size:.97rem; font-weight:800; color:var(--coral) }
.item-foot { margin-top:auto; padding-top:8px }

/* Buttons */
.btn-add {
  width:100%; background:var(--coral); color:#fff;
  border-radius:var(--rs); padding:9px;
  font-weight:800; font-size:.86rem;
  box-shadow:0 3px 10px rgba(255,94,91,.3);
  transition:background .15s, transform .15s;
}
.btn-add:active { transform:scale(.97); background:#e54845 }
.btn-add:disabled {
  background:#E5DDD5; color:#B8AFA8;
  box-shadow:none; cursor:not-allowed; transform:none;
}
.qty-ctrl { display:flex; align-items:center; border:1.5px solid var(--border); border-radius:var(--rs); overflow:hidden }
.btn-q {
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; font-weight:700; color:var(--coral);
  flex-shrink:0; transition:background .15s;
}
.btn-q:active { background:rgba(255,94,91,.1) }
.btn-q:disabled { color:#ccc; cursor:not-allowed }
.qty-num {
  flex:1; text-align:center; font-weight:800; font-size:.85rem;
  white-space:nowrap;
}
.unavail-lbl {
  width:100%; padding:9px; text-align:center;
  font-size:.8rem; font-weight:700; color:#999;
  background:#F7F4F0; border-radius:var(--rs);
}
.no-date-lbl {
  width:100%; padding:9px; text-align:center;
  font-size:.8rem; font-weight:700; color:var(--muted);
  background:#F7F4F0; border-radius:var(--rs);
}

/* Empty + skeleton */
.empty-state {
  grid-column:1/-1; padding:48px 0; text-align:center; color:var(--muted);
}
.empty-ico { font-size:3rem; margin-bottom:12px }
.empty-state h3 { font-family:'Fredoka',sans-serif; font-size:1.15rem; color:var(--text); margin-bottom:6px }

.sk {
  background:var(--card); border-radius:var(--r);
  border:1.5px solid var(--border); overflow:hidden;
}
.sk-img { aspect-ratio:1; background:linear-gradient(90deg,#F0EBE3 25%,#E5DDD5 50%,#F0EBE3 75%); background-size:200% 100%; animation:sk 1.4s ease-in-out infinite }
.sk-body { padding:10px 12px 12px }
.sk-line {
  height:10px; border-radius:4px; margin-bottom:8px;
  background:linear-gradient(90deg,#F0EBE3 25%,#E5DDD5 50%,#F0EBE3 75%);
  background-size:200% 100%; animation:sk 1.4s ease-in-out infinite;
}
.sk-line.sm { width:55% } .sk-line.lg { width:85% } .sk-line.btn { height:32px; border-radius:var(--rs); margin-top:12px }
@keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ═══════════════ BOTTOM CART BAR ═══════════════ */
.cart-bar {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:rgba(255,251,245,.97);
  backdrop-filter:blur(16px);
  border-top:1.5px solid var(--border);
  padding:10px 16px calc(10px + var(--safe));
  align-items:center; gap:12px;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.cart-bar.show { display:flex }
.cbi { flex:1; min-width:0 }
.cbi-label { font-size:.7rem; color:var(--muted); font-weight:600 }
.cbi-count { font-size:.98rem; font-weight:800; line-height:1.3 }
.cbi-total { font-size:.8rem; color:var(--muted) }
.cbi-total strong { color:var(--coral) }
.btn-open-cart {
  background:var(--coral); color:#fff;
  border-radius:var(--rs); padding:12px 18px;
  font-weight:800; font-size:.9rem; flex-shrink:0;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 4px 16px rgba(255,94,91,.35);
  transition:transform .15s;
}
.btn-open-cart:active { transform:scale(.97) }
.cart-n {
  background:#fff; color:var(--coral);
  border-radius:20px; padding:1px 7px;
  font-size:.72rem; font-weight:800; min-width:20px; text-align:center;
}

/* ═══════════════ DRAWER ═══════════════ */
.overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,.4); backdrop-filter:blur(4px);
}
.overlay.open { display:block; animation:fdi .2s ease }
@keyframes fdi { from{opacity:0} to{opacity:1} }

.drawer {
  position:fixed; bottom:0; left:0; right:0; z-index:301;
  background:var(--bg); border-radius:20px 20px 0 0;
  max-height:88dvh; display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  overflow:hidden;
}
.drawer.open { transform:translateY(0) }

@media(min-width:640px) {
  .drawer {
    left:auto; right:0; top:0; bottom:0;
    width:380px; max-height:100dvh; border-radius:0;
    transform:translateX(100%);
  }
  .drawer.open { transform:translateX(0) }
}

.drw-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:12px auto 0; flex-shrink:0 }
@media(min-width:640px){.drw-handle{display:none}}

.drw-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px 12px; border-bottom:1.5px solid var(--border); flex-shrink:0;
}
.drw-hdr h3 { font-family:'Fredoka',sans-serif; font-size:1.15rem; font-weight:700 }
.btn-close {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; color:var(--muted);
  background:rgba(0,0,0,.06); transition:background .15s;
}
.btn-close:active { background:var(--coral); color:#fff }

.drw-body { flex:1; overflow-y:auto; padding:0 20px 8px; -webkit-overflow-scrolling:touch }

.cart-empty { padding:48px 0; text-align:center; color:var(--muted) }
.cart-empty-ico { font-size:3rem; margin-bottom:12px }
.cart-empty h4 { font-family:'Fredoka',sans-serif; font-size:1rem; color:var(--text); margin-bottom:6px }

.ci {
  display:flex; align-items:center; gap:12px;
  padding:12px 0; border-bottom:1px solid var(--border);
}
.ci:last-child { border-bottom:none }
.ci-ph {
  width:52px; height:52px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg,#F0EBE3,#E5DDD5);
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; overflow:hidden;
}
.ci-ph img { width:100%; height:100%; object-fit:cover }
.ci-info { flex:1; min-width:0 }
.ci-name { font-weight:700; font-size:.86rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.ci-price { font-size:.76rem; color:var(--muted); margin-top:2px }
.ci-ctrl { display:flex; align-items:center; gap:7px; flex-shrink:0 }
.ci-btn {
  width:28px; height:28px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:700;
  border:1.5px solid var(--border); color:var(--coral);
  transition:all .15s;
}
.ci-btn:active { background:var(--coral); color:#fff; border-color:var(--coral) }
.ci-q { font-weight:800; font-size:.86rem; min-width:18px; text-align:center }
.ci-rm { margin-left:2px; color:#ccc; font-size:.95rem; transition:color .15s }
.ci-rm:active { color:var(--coral) }

.drw-foot {
  padding:14px 20px calc(14px + var(--safe));
  border-top:1.5px solid var(--border); background:var(--card); flex-shrink:0;
}
.sum { margin-bottom:14px; display:none }
.sum-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:.84rem; color:var(--muted); margin-bottom:6px;
}
.sum-row.total {
  font-size:.98rem; font-weight:800; color:var(--text);
  padding-top:10px; margin-top:6px; border-top:1.5px solid var(--border);
}
.sum-row.total strong { color:var(--coral); font-size:1.05rem }
.btn-wa {
  width:100%; background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff; border-radius:var(--rs); padding:14px;
  font-weight:800; font-size:.93rem; letter-spacing:.2px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(37,211,102,.3); transition:transform .15s;
}
.btn-wa:active { transform:scale(.98) }
.btn-wa:disabled { background:#ccc; box-shadow:none; pointer-events:none }

/* ═══════════════ TOAST ═══════════════ */
.toasts {
  position:fixed; top:76px; left:50%; transform:translateX(-50%);
  z-index:500; width:calc(100% - 32px); max-width:340px;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.toast {
  background:var(--text); color:#fff;
  border-radius:var(--rs); padding:11px 16px;
  font-size:.83rem; font-weight:600; text-align:center;
  box-shadow:var(--shadowL); pointer-events:auto;
  animation:tin .25s ease, tout .3s ease 2.7s forwards;
}
.toast.s { background:#065F46 }
.toast.w { background:#92400E }
.toast.e { background:#991B1B }
@keyframes tin  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes tout { from{opacity:1} to{opacity:0;transform:translateY(-6px)} }

/* ═══════════════ WA FLOAT ═══════════════ */
.wa-float {
  display:none; position:fixed;
  right:16px; bottom:calc(88px + var(--safe));
  z-index:150; width:48px; height:48px; border-radius:50%;
  background:#25D366; align-items:center; justify-content:center;
  font-size:1.4rem; text-decoration:none;
  box-shadow:0 4px 16px rgba(37,211,102,.4);
  transition:transform .2s;
}
.wa-float.show { display:flex }
.wa-float:active { transform:scale(.93) }

/* ═══════════════ ERROR ═══════════════ */
.err-page {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:60dvh;
  padding:32px; text-align:center; color:var(--muted);
}
.err-page .ico { font-size:3.5rem; margin-bottom:16px }
.err-page h2 { font-family:'Fredoka',sans-serif; font-size:1.3rem; color:var(--text); margin-bottom:8px }
.err-page p { font-size:.88rem; max-width:280px; line-height:1.5 }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="hdr">
  <div class="hdr-inner">
    <div id="logo-wrap"><div class="brand-logo-ph" id="logo-ph">🎉</div></div>
    <div class="brand-info">
      <div class="brand-name" id="brand-name">Carregando…</div>
      <div class="brand-city" id="brand-city"></div>
    </div>
    <span class="hdr-pill">Pede Festas</span>
  </div>
</header>

<!-- ── DATE PICKER ── -->
<section class="date-zone" id="date-zone">
  <div class="date-card" id="date-card">
    <h2>📅 Quando é a sua festa?</h2>
    <p>Toque na data desejada</p>

    <!-- Calendário visual -->
    <div class="cal-wrap" id="cal-wrap">
      <div class="cal-nav">
        <button type="button" class="cal-nav-btn" id="cal-prev" onclick="navMonth(-1)" aria-label="Mês anterior">‹</button>
        <div class="cal-month" id="cal-month">—</div>
        <button type="button" class="cal-nav-btn" id="cal-next" onclick="navMonth(1)" aria-label="Próximo mês">›</button>
      </div>
      <div class="cal-dows">
        <div class="cal-dow">D</div><div class="cal-dow">S</div><div class="cal-dow">T</div>
        <div class="cal-dow">Q</div><div class="cal-dow">Q</div><div class="cal-dow">S</div><div class="cal-dow">S</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="date-row">
      <div class="date-field">
        <input type="date" id="date-in" min=""/>
      </div>
      <button class="btn-ok" onclick="confirmDate()">Ver estoque ✓</button>
    </div>
  </div>
  <div class="date-banner" id="date-banner">
    <span>🎉 Festa em <strong id="date-txt">—</strong></span>
    <button class="btn-change" onclick="resetDate()">Mudar data</button>
  </div>
</section>

<!-- ── CATALOG ── -->
<main class="catalog" id="catalog" style="display:none">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar item…" id="search-in" oninput="filterItems()"/>
  </div>
  <div class="chips" id="chips">
    <button class="chip active" onclick="setCategory('Todos',this)">Todos</button>
  </div>
  <div class="cat-hdr">
    <span class="cat-title" id="cat-title">Catálogo</span>
    <span class="cat-count" id="cat-count"></span>
  </div>
  <div class="items-grid" id="grid">
    <div class="sk"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sm"></div><div class="sk-line lg"></div><div class="sk-line sm"></div><div class="sk-line btn"></div></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sm"></div><div class="sk-line lg"></div><div class="sk-line sm"></div><div class="sk-line btn"></div></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sm"></div><div class="sk-line lg"></div><div class="sk-line sm"></div><div class="sk-line btn"></div></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sm"></div><div class="sk-line lg"></div><div class="sk-line sm"></div><div class="sk-line btn"></div></div></div>
  </div>
</main>

<!-- ── BOTTOM BAR ── -->
<div class="cart-bar" id="cart-bar">
  <div class="cbi">
    <div class="cbi-label">Meu pedido</div>
    <div class="cbi-count" id="bar-count">0 itens</div>
    <div class="cbi-total">Total: <strong id="bar-total">R$ 0,00</strong></div>
  </div>
  <button class="btn-open-cart" onclick="openCart()">
    🛒 Ver pedido <span class="cart-n" id="badge">0</span>
  </button>
</div>

<!-- ── WA FLOAT ── -->
<a class="wa-float" id="wa-float" href="#" target="_blank" rel="noopener">📞</a>

<!-- ── OVERLAY + DRAWER ── -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drw-handle"></div>
  <div class="drw-hdr">
    <h3>🛒 Meu Pedido</h3>
    <button class="btn-close" onclick="closeCart()">✕</button>
  </div>
  <div class="drw-body" id="drw-body">
    <div class="cart-empty" id="cart-empty">
      <div class="cart-empty-ico">🎈</div>
      <h4>Seu carrinho está vazio</h4>
      <p style="font-size:.82rem;color:var(--muted);margin-top:6px">Adicione itens do catálogo</p>
    </div>
  </div>
  <div class="drw-foot">
    <div class="sum" id="sum">
      <div class="sum-row"><span>Subtotal</span><span id="sum-sub">R$ 0,00</span></div>
      <div class="sum-row total"><span>Total</span><strong id="sum-tot">R$ 0,00</strong></div>
    </div>
    <button class="btn-wa" id="btn-wa" onclick="sendWA()" disabled>
      📲 Solicitar orçamento via WhatsApp
    </button>
  </div>
</div>

<!-- ── TOASTS ── -->
<div class="toasts" id="toasts"></div>

<!-- ── SCRIPT ── -->
<script>
const API  = 'https://festamais-backend-production.up.railway.app/api';
const slug = new URLSearchParams(location.search).get('empresa') || '';

let company = {};
let allItems = [];
let selDate  = '';
let activeCat = 'Todos';
let cart = {};

/* ── INIT ── */
(async () => {
  if (!slug) { showErr('Catálogo não encontrado. Verifique o link.'); return; }
  document.getElementById('date-in').min = new Date().toISOString().slice(0,10);
  await loadCompany();
  try { renderCalendar(); } catch(e){}
})();

/* ── COMPANY ── */
async function loadCompany() {
  try {
    const r = await fetch(`${API}/catalog/public/${slug}`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    company  = d.company || {};
    allItems = (d.items  || []).map(i => ({...i, _avail: undefined}));
    renderHeader();
    buildChips();
    document.getElementById('catalog').style.display = '';
    renderItems(allItems);
  } catch(e) {
    showErr('Não foi possível carregar este catálogo.<br>Verifique o link e tente novamente.');
  }
}

/* ── AVAILABILITY ── */
async function loadAvailability(date) {
  try {
    const r = await fetch(`${API}/catalog/availability/${slug}?date=${date}`);
    if (!r.ok) {
      console.error("Availability error:", r.status);
      allItems = allItems.map(i => ({...i, _avail: Number(i.stock_total ?? 0)}));
      filterItems();
      return;
    }
    const d = await r.json();
    const av = d.availability || {};
    
    // av é um objeto tipo: { "38": { stock_total: 10, disponivel: 10 }, "39": { ... } }
    allItems = allItems.map(i => {
      const itemAvail = av[String(i.id)];
      let disp = Number(i.stock_total ?? 0); // fallback ao estoque total
      
      if (itemAvail) {
        // itemAvail é um objeto: { stock_total, comprometido, disponivel }
        disp = Number(itemAvail.disponivel ?? itemAvail.stock_total ?? 0);
      }
      
      return {...i, _avail: disp};
    });
  } catch (err) {
    console.error("loadAvailability error:", err);
    allItems = allItems.map(i => ({...i, _avail: Number(i.stock_total ?? 0)}));
  }
  filterItems();
}

/* ── HEADER ── */
function renderHeader() {
  document.getElementById('brand-name').textContent = company.company_name || slug;
  document.getElementById('brand-city').textContent = company.city ? `📍 ${company.city}` : '';
  document.title = (company.company_name || 'Catálogo') + ' — Aluguel de Festas';
  document.getElementById('cat-title').textContent  = `Catálogo — ${company.company_name || ''}`;

  const wrap = document.getElementById('logo-wrap');
  if (company.logo) {
    wrap.innerHTML = `<img class="brand-logo" src="${esc(company.logo)}" alt="Logo"/>`;
  } else {
    const ph = document.getElementById('logo-ph');
    if (ph) ph.textContent = (company.company_name || 'F')[0].toUpperCase();
  }

  const wanum = (company.whatsapp || company.phone || '').replace(/\D/g,'');
  if (wanum) {
    const wa = document.getElementById('wa-float');
    wa.href = `https://wa.me/${wanum}`;
    wa.classList.add('show');
  }
}

/* ── CHIPS ── */
function buildChips() {
  const cats = ['Todos', ...new Set(allItems.map(i=>i.category).filter(Boolean).sort())];
  document.getElementById('chips').innerHTML = cats.map(c =>
    `<button class="chip${c==='Todos'?' active':''}" onclick="setCategory('${esc(c)}',this)">${esc(c)}</button>`
  ).join('');
}

function setCategory(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterItems();
}

function filterItems() {
  const q = document.getElementById('search-in').value.toLowerCase().trim();
  const list = allItems.filter(i => {
    const mc = activeCat === 'Todos' || i.category === activeCat;
    const mq = !q || (i.name||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q);
    return mc && mq;
  });
  renderItems(list);
}

/* ── RENDER ── */
function renderItems(items) {
  const grid = document.getElementById('grid');
  document.getElementById('cat-count').textContent =
    items.length ? `${items.length} ite${items.length===1?'m':'ns'}` : '';

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-ico">🎈</div>
      <h3>Nenhum item encontrado</h3>
      <p style="font-size:.85rem">Tente outra busca ou categoria</p>
    </div>`;
    return;
  }

  grid.innerHTML = items.map(item => {
    const qty    = cart[item.id]?.qty || 0;
    const avail  = item._avail !== undefined ? Number(item._avail) : Number(item.stock_total ?? 0);
    const noDate = !selDate;
    const zero   = selDate && avail <= 0;
    const maxed  = qty >= avail && !noDate;

    /* badge */
    let badge = '';
    if (selDate) {
      if (avail <= 0)
        badge = `<span class="av-badge av-zero">Indisponível</span>`;
      else if (avail <= Math.max(1, Math.ceil((item.stock_total || avail) * .3)))
        badge = `<span class="av-badge av-warn">⚠ ${avail} restantes</span>`;
      else
        badge = `<span class="av-badge av-ok">✓ ${avail} disponíveis</span>`;
    }

    /* photo */
    const photo = item.photo
      ? `<img src="${esc(item.photo)}" alt="${esc(item.name)}" loading="lazy"/>`
      : `<span class="no-photo">🎪</span>`;

    /* price */
    const price = fmtBRL(item.price_per_day || 0);

    /* control */
    let ctrl = '';
    if (zero) {
      ctrl = `<div class="unavail-lbl">❌ Sem estoque nesta data</div>`;
    } else if (noDate) {
      ctrl = `<div class="no-date-lbl">📅 Selecione a data</div>`;
    } else if (qty > 0) {
      ctrl = `<div class="qty-ctrl">
        <button class="btn-q" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qty-num">${qty}/${avail}</span>
        <button class="btn-q" onclick="changeQty('${item.id}',1)"${maxed?' disabled':''}>+</button>
      </div>`;
    } else {
      ctrl = `<button class="btn-add" onclick="addToCart('${item.id}')">+ Adicionar</button>`;
    }

    return `<article class="item-card${zero?' unavail':''}" data-id="${item.id}">
      <div class="item-photo">${photo}${badge}</div>
      <div class="item-body">
        <div class="item-cat">${esc(item.category||'Geral')}</div>
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-price"><strong>${price}</strong> /dia</div>
        <div class="item-foot">${ctrl}</div>
      </div>
    </article>`;
  }).join('');
}

/* ── DATE ── */
function confirmDate() {
  const val = document.getElementById('date-in').value;
  if (!val) { toast('📅 Selecione uma data!','w'); return; }
  selDate = val;
  const fmt = new Date(val+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('date-txt').textContent = fmt;
  document.getElementById('date-card').style.display = 'none';
  document.getElementById('date-banner').classList.add('show');
  toast('⏳ Verificando disponibilidade…','s');
  loadAvailability(val);
}

function resetDate() {
  selDate = '';
  cart = {};
  updateBar();
  allItems = allItems.map(i => ({...i, _avail: undefined}));
  document.getElementById('date-card').style.display = '';
  document.getElementById('date-banner').classList.remove('show');
  document.getElementById('date-in').value = '';
  // volta o calendário pro mês atual
  try {
    calCursor = new Date(); calCursor.setDate(1);
    renderCalendar();
  } catch(e){}
  filterItems();
}

/* ── CART ── */
function addToCart(id) {
  if (!selDate) { toast('📅 Selecione a data do evento primeiro!','w'); return; }
  const item = allItems.find(i => String(i.id)===String(id));
  if (!item) return;
  const avail = Number(item._avail ?? item.stock_total ?? 0);
  const cur   = cart[id]?.qty || 0;
  if (avail <= 0) { toast(`❌ ${item.name} indisponível nesta data`,'e'); return; }
  if (cur >= avail) { toast(`⚠️ Máximo de ${avail} para esta data!`,'w'); return; }
  cart[id] = {item, qty: cur+1};
  updateBar();
  toast(`🎉 ${item.name} adicionado!`,'s');
  filterItems();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  const item  = allItems.find(i => String(i.id)===String(id));
  const avail = Number(item?._avail ?? item?.stock_total ?? 0);
  const nq    = cart[id].qty + delta;
  if (delta>0 && nq>avail) { toast(`⚠️ Máximo de ${avail} para esta data!`,'w'); return; }
  if (nq<=0) delete cart[id]; else cart[id].qty = nq;
  updateBar();
  filterItems();
}

function removeItem(id) {
  delete cart[id];
  updateBar();
  renderDrawer();
  filterItems();
}

/* ── BAR ── */
function updateBar() {
  const vals  = Object.values(cart);
  const count = vals.reduce((s,{qty})=>s+qty,0);
  const total = vals.reduce((s,{item,qty})=>s+Number(item.price_per_day||0)*qty,0);
  document.getElementById('badge').textContent    = count;
  document.getElementById('bar-count').textContent = `${count} ite${count===1?'m':'ns'}`;
  document.getElementById('bar-total').textContent = fmtBRL(total);
  document.getElementById('sum-sub').textContent   = fmtBRL(total);
  document.getElementById('sum-tot').textContent   = fmtBRL(total);
  document.getElementById('cart-bar').classList.toggle('show', count>0);
  document.getElementById('btn-wa').disabled = count===0;
  document.getElementById('sum').style.display = count>0 ? '' : 'none';
}

/* ── DRAWER ── */
function openCart() {
  renderDrawer();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}

function renderDrawer() {
  const vals = Object.values(cart);
  const body = document.getElementById('drw-body');
  document.getElementById('cart-empty').style.display = vals.length ? 'none' : '';
  if (!vals.length) { body.innerHTML = ''; body.appendChild(document.getElementById('cart-empty')); return; }

  body.innerHTML = vals.map(({item,qty}) => {
    const sub = Number(item.price_per_day||0)*qty;
    const ph  = item.photo ? `<img src="${esc(item.photo)}" alt="${esc(item.name)}"/>` : (item.name[0]||'?').toUpperCase();
    return `<div class="ci">
      <div class="ci-ph">${ph}</div>
      <div class="ci-info">
        <div class="ci-name">${esc(item.name)}</div>
        <div class="ci-price">${qty}× ${fmtBRL(item.price_per_day||0)} = <strong>${fmtBRL(sub)}</strong></div>
      </div>
      <div class="ci-ctrl">
        <button class="ci-btn" onclick="drawerQ('${item.id}',-1)">−</button>
        <span class="ci-q">${qty}</span>
        <button class="ci-btn" onclick="drawerQ('${item.id}',1)">+</button>
        <button class="ci-rm" onclick="removeItem('${item.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function drawerQ(id, delta) {
  changeQty(id, delta);
  renderDrawer();
}

/* ── WHATSAPP ── */
function sendWA() {
  const vals = Object.values(cart);
  if (!vals.length) return;
  const wanum = (company.whatsapp||company.phone||'').replace(/\D/g,'');
  if (!wanum) { toast('❌ Empresa sem número de WhatsApp','e'); return; }

  const dateStr = selDate
    ? new Date(selDate+'T12:00:00').toLocaleDateString('pt-BR')
    : 'a confirmar';

  const lines = vals.map(({item,qty}) => {
    const sub = Number(item.price_per_day||0)*qty;
    return `• ${qty}× ${item.name} — ${fmtBRL(sub)}`;
  });
  const total = vals.reduce((s,{item,qty})=>s+Number(item.price_per_day||0)*qty,0);

  const msg = [
    `Olá! Vim pelo catálogo online e gostaria de solicitar um orçamento 🎉`,
    '',
    `📅 Data do evento: *${dateStr}*`,
    '',
    `*Itens desejados:*`,
    ...lines,
    '',
    `💰 *Total estimado: ${fmtBRL(total)}*`,
    '',
    `Aguardo confirmação de disponibilidade. Obrigado!`
  ].join('\n');

  window.open(`https://wa.me/${wanum}?text=${encodeURIComponent(msg)}`, '_blank');
}

/* ── TOAST ── */
function toast(msg, type='s') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3100);
}

/* ── ERROR ── */
function showErr(msg) {
  document.body.innerHTML = `
    <div class="err-page">
      <div class="ico">😕</div>
      <h2>Ops!</h2>
      <p>${msg}</p>
    </div>`;
}

/* ── UTILS ── */
function fmtBRL(v) {
  return `R$ ${Number(v).toFixed(2).replace('.',',')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Touch swipe-down to close drawer */
let sy = 0;
const drw = document.getElementById('drawer');
drw.addEventListener('touchstart', e => { sy = e.touches[0].clientY }, {passive:true});
drw.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - sy > 80) closeCart() }, {passive:true});

/* ── CALENDARIO VISUAL (defensivo - adicional ao input nativo) ── */
let calCursor = (function(){ const d = new Date(); d.setDate(1); return d; })();

function renderCalendar() {
  try {
    const grid = document.getElementById('cal-grid');
    const monthEl = document.getElementById('cal-month');
    if (!grid || !monthEl) return;

    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    monthEl.textContent = calCursor.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});

    const today = new Date(); today.setHours(0,0,0,0);
    const firstOfThisMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    const prevBtn = document.getElementById('cal-prev');
    if (prevBtn) prevBtn.disabled = (calCursor.getTime() <= firstOfThisMonth.getTime());

    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const todayStr = today.toISOString().slice(0,10);

    const cells = [];
    for (let i=0; i<firstDow; i++) cells.push('<div class="cal-day empty"></div>');
    for (let d=1; d<=daysInMonth; d++) {
      const dStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const dDate = new Date(dStr + 'T00:00:00');
      const isPast = dDate < today;
      const isToday = dStr === todayStr;
      const isSelected = dStr === selDate;
      const cls = ['cal-day'];
      if (isPast) cls.push('disabled');
      if (isToday) cls.push('today');
      if (isSelected) cls.push('selected');
      const onclick = isPast ? '' : ' onclick="pickCalDate(\'' + dStr + '\')"';
      cells.push('<div class="' + cls.join(' ') + '"' + onclick + '>' + d + '</div>');
    }
    grid.innerHTML = cells.join('');
  } catch (e) {
    console.error('Erro no calendario:', e);
  }
}

function navMonth(delta) {
  try {
    calCursor.setMonth(calCursor.getMonth() + delta);
    renderCalendar();
  } catch(e) { console.error(e); }
}

function pickCalDate(dStr) {
  try {
    // Seta o input nativo (compatibilidade) e dispara o fluxo existente
    const input = document.getElementById('date-in');
    if (input) input.value = dStr;
    selDate = dStr;
    renderCalendar();
    // Chama o fluxo existente — sem reescrever nada
    if (typeof confirmDate === 'function') confirmDate();
  } catch(e) { console.error(e); }
}
</script>
